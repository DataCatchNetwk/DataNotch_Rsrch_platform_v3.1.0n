name: Network Enforcement Smoke Test

on:
  pull_request:
    branches:
      - main
      - admin
  workflow_dispatch:

jobs:
  network-enforcement:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: health_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d health_data"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: 4000
      API_BASE_URL: http://localhost:4000
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DATABASE_HOST: 127.0.0.1
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: health_data
      JWT_SECRET: ci-test-secret
      AUTH_NETWORK_BLOCK_ENABLED: true
      AUTH_NETWORK_FAIL_CLOSED: true
      AUTH_NETWORK_CHECK_URL: http://127.0.0.1:9
      AUTH_NETWORK_CHECK_TIMEOUT_MS: 1000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL repository secret is required for Prisma commands and API startup."
            exit 1
          fi

      - name: Generate Prisma client
        run: pnpm --dir apps/api run prisma:generate

      - name: Apply Prisma migrations
        run: pnpm --dir apps/api exec prisma migrate deploy

      - name: Build API
        run: pnpm --dir apps/api run build

      - name: Start API server
        run: |
          pnpm --dir apps/api run start > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid

      - name: Wait for API health
        run: |
          for i in {1..60}; do
            if ! kill -0 "$(cat /tmp/server.pid)" 2>/dev/null; then
              echo "::error::API process exited before becoming healthy."
              cat /tmp/server.log
              exit 1
            fi

            status="$(curl -sS -o /tmp/health-response.txt -w "%{http_code}" http://localhost:4000/health || true)"
            if [ "$status" = "200" ]; then
              echo "API is healthy"
              exit 0
            fi

            if [ "$i" = "1" ] || [ $((i % 10)) -eq 0 ]; then
              echo "Waiting for API health ($i/60, last status: ${status:-curl_failed})"
            fi
            sleep 2
          done
          echo "API failed to become healthy"
          cat /tmp/server.log
          exit 1

      - name: Run network enforcement smoke test
        run: pnpm --dir apps/api run test:network-enforcement

      - name: Print server logs on failure
        if: failure()
        run: cat /tmp/server.log

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill $(cat /tmp/server.pid) || true
          fi

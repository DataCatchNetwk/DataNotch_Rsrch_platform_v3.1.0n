name: Industrial Readiness CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL repository secret is required for Prisma commands."
            exit 1
          fi

      - name: Generate Prisma client
        run: pnpm --dir apps/api run prisma:generate

      - name: Build server
        run: pnpm --dir apps/api run build

      - name: Typecheck web
        run: pnpm --dir apps/web exec tsc --noEmit

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: datanotch
      POSTGRES_PASSWORD: datanotch
      POSTGRES_DB: datanotch
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
volumes:
  pgdata:
